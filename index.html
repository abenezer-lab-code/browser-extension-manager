<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Browser extensions manager UI</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <main class="main-container">
<header class="header">
  <div class="logo-section">
  <div class="image-container">
  <img src="assets/images/logo.svg" alt="Extension logo" class="extension-logo"/>
  <h1 class="dark-extension-logo-text">Extensions</h1>
  </div>
  <button class="theme-switcher-btn" data-theme-toggle aria-label=""><img src="assets/images/icon-moon.svg" class="theme-image" aria-hidden="true"/></button>
  </div>
  <section class="extension-list">
    <h2 class="extension-list-heading dark">Extensions List</h2>
    <ul class="extension-btn-container">
  <li><button class="extension-btn current-btn all" aria-current="true" id="all">All</button></li>
 <li><button  class="extension-btn active" id="active">Active</button></li>
 <li><button  class="extension-btn inactive"  id="inactive">Inactive</button></li>
    </ul>
  </section>
</header>
 
<section class="extensions-container">
 
</section>
  
  </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
