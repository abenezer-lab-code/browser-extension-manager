<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Browser extensions manager UI</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <main class="main-container">
<header class="header">
  <div class="logo-section">
  <img src="assets/images/logo.svg" alt="Extension" class="extension-logo"/>
  
  <button class="theme-swithcher-btn" aria-label="theme-switcher"><img src="assets/images/icon-moon.svg"/></button>
  </div>
  <div class="extesnio-list">
    <h2 class="extension-list-heading dark">Extensions List</h2>
    <div class="extension-btn-container">
  <button class="extension-btn current-btn all" aria-pressed="true" id="all">All</button>
  <button  class="extension-btn active" aria-pressed="false" id="active">Active</button>
  <button  class="extension-btn inactive" aria-pressed="false" id="inactive">Inactive</button>
  </div>
  </div>
</header>

<section class="extensions-container">
 
</section>
  
  </div>
